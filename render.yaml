services:
  - type: web
    name: wasla-main
    env: docker
    plan: starter # 'free' plan does not support persistent disks (which we need for SQLite), so we default to 'starter'.
    healthCheckPath: /api/health
    envVars:
      - key: ADMIN_PIN
        value: REPLACE_ME
      - key: SALES_PIN
        value: REPLACE_ME
      - key: DATABASE_URL
        value: /app/data/batimatec2026.db
    # Persistent mount for SQLite (won't be lost on container restart)
    disk:
      name: wasla-data
      mountPath: /app/data
      sizeGB: 1
